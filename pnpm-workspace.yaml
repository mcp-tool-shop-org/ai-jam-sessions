# This repo is a single package, not a multi-package monorepo (site/ builds
# with npm; apps/cockpit is its own standalone pnpm workspace). The `packages`
# field is still required: without it, pnpm aborts `pnpm store path` (invoked
# by actions/setup-node's `cache: pnpm`) with "packages field missing or
# empty". Declaring the root as the sole member keeps the file valid across
# pnpm 9/10/11 while the build-approval and override keys below take effect.
packages:
  - "."

allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild

# The single home of the dependency overrides since 2026-07-09, when CI moved
# to pnpm 10 and package.json's legacy "pnpm.overrides" mirror was removed
# (pnpm 10/11 read overrides only from this file; pnpm 9 read only the
# package.json field). CVE rationale: fast-uri — GHSA path-traversal/
# host-confusion via the ajv chain; ws — GHSA memory-exhaustion DoS via
# vocal-synth-engine.
overrides:
  fast-uri: 3.1.3
  ws: 8.21.0
