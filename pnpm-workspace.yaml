# This repo is a single package, not a multi-package monorepo (site/ and
# apps/cockpit/ are built separately with npm). The `packages` field is still
# required: without it, pnpm 9 — the version CI runs — aborts `pnpm store path`
# (invoked by actions/setup-node's `cache: pnpm`) with "packages field missing
# or empty". Declaring the root as the sole member keeps the file valid across
# pnpm 9/10/11 while the build-approval and override keys below take effect.
packages:
  - "."

allowBuilds:
  esbuild: true
onlyBuiltDependencies:
  - esbuild

# Mirrors package.json's "pnpm.overrides" (which pnpm 9, the version CI
# tests against, reads). pnpm 10/11 read workspace-level overrides from
# this file instead, so both are kept in sync — see package.json for the
# CVE rationale (fast-uri: GHSA path-traversal/host-confusion via the ajv
# chain; ws: GHSA memory-exhaustion DoS via vocal-synth-engine).
overrides:
  fast-uri: 3.1.3
  ws: 8.21.0
