name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Verify tarball contents
        run: pnpm pack && ls -la *.tgz

      # TODO(PR #12): migrate this step to OIDC Trusted Publishing once a
      # Trusted Publisher is configured for @mcptoolshop/ai-jam-sessions on
      # npmjs.com (owner=mcp-tool-shop-org, repo=ai-jam-sessions,
      # workflow=release.yml). Until then, publish-docker below `needs:`
      # this job so an invalid/expired NPM_TOKEN can't leave a Docker image
      # published under a version that was never actually shipped to npm.
      - name: Publish to npm
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strip a leading "v" so release-triggered runs (tag_name=v1.4.3) and
      # workflow_dispatch runs (falls back to package.json's bare 1.4.3)
      # always produce the same Docker tag for the same version.
      - name: Determine Docker tag
        id: tag
        # The tag name is passed via env, never interpolated into the shell
        # body — git tag names may legally contain shell metacharacters, and
        # this step runs after ghcr.io login with packages:write granted.
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
            if [ -z "$VERSION" ]; then
              echo "ERROR: release tag '$RELEASE_TAG' is empty after stripping the leading 'v'"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p 'require(\"./package.json\").version')" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
