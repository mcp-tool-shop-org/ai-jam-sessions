name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-npm:
    # App releases only: this repo also cuts ARTIFACT releases (dataset
    # packages, model adapters — e.g. the jam-ft-v1-adapters release, which
    # fired this workflow on 2026-07-11 and pushed a stray ghcr tag). Those
    # tags never start with 'v'; app release tags always do. Non-app releases
    # must not republish npm or move the Docker :latest tag.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Node 24 bundles npm >= 11.5, which speaks OIDC Trusted Publishing
          # natively — no fragile in-place npm upgrade (the first v1.5.0
          # publish attempt died on exactly that: a clobbered toolcache npm 10
          # missing its sigstore module).
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Verify tarball contents
        run: pnpm pack && ls -la *.tgz

      # OIDC Trusted Publishing (configured on npmjs.com 2026-07-10:
      # owner=mcp-tool-shop-org, repo=ai-jam-sessions, workflow=release.yml).
      # Auth is the workflow's OIDC identity — intentionally NO NODE_AUTH_TOKEN.
      # Node 24's bundled npm (>= 11.5) handles the OIDC exchange natively.
      # (Adopted from PR #12, applied directly after it conflicted with the
      # pnpm-10 CI work.)
      # Rerun-safe: a workflow_dispatch retry after a partial release (e.g.
      # npm published but Docker failed) skips the already-live version
      # instead of dying on E409, so downstream jobs still run.
      - name: Publish to npm with Sigstore provenance
        run: |
          set -euo pipefail
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "$PKG@$VERSION already on the registry — skipping publish"
          else
            npm publish --provenance --access public
          fi

  publish-docker:
    # Same app-tags-only guard as publish-npm (needs alone would not skip
    # this job if publish-npm is skipped by its condition on some runners —
    # explicit beats inherited here).
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'v')
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strip a leading "v" so release-triggered runs (tag_name=v1.4.3) and
      # workflow_dispatch runs (falls back to package.json's bare 1.4.3)
      # always produce the same Docker tag for the same version.
      - name: Determine Docker tag
        id: tag
        # The tag name is passed via env, never interpolated into the shell
        # body — git tag names may legally contain shell metacharacters, and
        # this step runs after ghcr.io login with packages:write granted.
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="${RELEASE_TAG#v}"
            if [ -z "$VERSION" ]; then
              echo "ERROR: release tag '$RELEASE_TAG' is empty after stripping the leading 'v'"
              exit 1
            fi
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
