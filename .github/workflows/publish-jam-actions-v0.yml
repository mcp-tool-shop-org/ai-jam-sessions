name: Publish jam-actions-v0

# Operator-mediated publication workflow for the jam-actions-v0 dataset.
#
# This workflow NEVER runs on push or schedule. Manual trigger only.
# Default inputs produce a Zenodo DRAFT (no DOI minted, no HF push).
# DOI minting + HF push require explicit `confirm_irreversible=yes-mint-doi`.
#
# Tokens (ZEN_TOKEN, HF_TOKEN) come from GitHub Secrets. They are injected
# as env vars only inside the steps that need them. Never echoed, never
# written to files, never logged.
#
# ─── Compensators (irreversible actions in this workflow) ───────────────────
# Zenodo DOI mint (publish step)
#   Undo:  DOIs cannot be revoked. Zenodo supports "new version" deposits on
#          the published record for corrections — there is no delete.
#          See https://developers.zenodo.org
#   Owner: mcp-tool-shop
#
# Abandoned Zenodo DRAFT (mode=draft-only, no publish) — fresh OR new-version
#   Undo:  Safely deletable from the Zenodo web UI, or
#          DELETE /api/deposit/depositions/{id} (discards the unpublished
#          new-version draft; the published prior version is untouched)
#   Owner: mcp-tool-shop
#
# HuggingFace dataset push (mode=publish, HF half fails after Zenodo succeeds)
#   Undo:  push-jam-actions-v0-hf.yml (this repo) is the designated recovery
#          path — re-run it standalone to retry just the HF upload without
#          re-minting a DOI.
#   Owner: mcp-tool-shop
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Publication mode"
        required: true
        type: choice
        default: "draft-only"
        options:
          - "draft-only"
          - "publish-zenodo-only"
          - "publish"
      confirm_irreversible:
        description: 'Type exactly "yes-mint-doi" to authorize DOI minting and/or HF push. Any other value aborts.'
        required: false
        default: "no"
      zenodo_newversion_of:
        description: "Existing PUBLISHED Zenodo record id to create a NEW VERSION of (same concept DOI). Default = 20279919 (v0.4.3). Empty = brand-new deposit with its own concept DOI (first-publication path)."
        required: false
        default: "20279919"
      ref:
        description: "Git ref to publish from (the version's cut tag, or main)"
        required: false
        default: "main"

concurrency:
  group: publish-jam-actions-v0
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── Input gate ──────────────────────────────────────────────────────────
      - name: Validate inputs (irreversible-action gate)
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.mode }}"
          CONFIRM="${{ github.event.inputs.confirm_irreversible }}"
          echo "Mode: $MODE"
          echo "Confirm token: <redacted>"
          case "$MODE" in
            draft-only)
              echo "→ Will create a Zenodo DRAFT, upload archives, set metadata. No DOI mint. No HF push."
              ;;
            publish-zenodo-only)
              if [ "$CONFIRM" != "yes-mint-doi" ]; then
                echo "ERROR: mode=publish-zenodo-only requires confirm_irreversible=yes-mint-doi"
                exit 1
              fi
              echo "→ Will create Zenodo draft + PUBLISH (mint DOI). No HF push."
              ;;
            publish)
              if [ "$CONFIRM" != "yes-mint-doi" ]; then
                echo "ERROR: mode=publish requires confirm_irreversible=yes-mint-doi"
                exit 1
              fi
              echo "→ Will create Zenodo draft + PUBLISH (mint DOI) + push to HuggingFace."
              ;;
            *)
              echo "ERROR: unknown mode: $MODE"
              exit 1
              ;;
          esac

      # ─── Checkout + tooling ──────────────────────────────────────────────────
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pnpm install --frozen-lockfile

      # ─── Pre-flight verifications (must pass or workflow aborts) ─────────────
      - name: Verify package checksums
        run: pnpm exec tsx scripts/verify-public-package-checksums.ts

      - name: Read dataset version
        id: version
        run: |
          set -euo pipefail
          VER=$(cat datasets/jam-actions-v0-public/VERSION)
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Dataset version: $VER"

      # Since v0.5.0 the sealed Slice-21 E3 baseline is NOT shipped in the
      # package (it was measured on v0.4.3 records — RELEASE_NOTES.md explains).
      # The RC gate still recomputes here at publish time: restore the sealed
      # baseline bytes from git history (fetch-depth: 0 above makes every
      # commit available), assert the exact sha256 the finetune-arc locks pin,
      # then run the pure validator against it. The per-record trace sources it
      # resolves (slice18-5 / slice19-tool-fresh / slice21-schumann-rerun) still
      # ship in the package.
      - name: Verify release gate (sealed Slice-21 baseline from git history)
        run: |
          set -euo pipefail
          SEALED_REF="jam-actions-v0-feature-marketed-2026-05-19"
          SEALED_SHA="5bb5b2244b0bb03dc38a9235804ac71468084e3881ead6c823a79197d25b8e23"
          git show "${SEALED_REF}:datasets/jam-actions-v0-public/evals/slice21-fair-e3-baseline-results.json" \
            > /tmp/slice21-fair-e3-baseline-results.json
          echo "${SEALED_SHA}  /tmp/slice21-fair-e3-baseline-results.json" | sha256sum -c -
          pnpm exec tsx scripts/check-release-gate.ts /tmp/slice21-fair-e3-baseline-results.json

      # The execution-verification standing gate (every frozen tool_call
      # replayed against the live MCP server) runs at CUT time on a rig with
      # an audio device — play_song cannot run on this headless runner
      # (node-web-audio-api reports devicenotavailable even for valid calls).
      # Here we verify the SHIPPED receipt instead: it must exist for this
      # version, carry verdict PASS with zero failures, and its record bytes
      # are already pinned by the checksum verification above.
      - name: Verify execution-verification receipt (cut-time standing gate)
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          RECEIPT="datasets/jam-actions-v0-public/evals/v${VER}-execution-verification.json"
          test -f "$RECEIPT" || { echo "ERROR: missing $RECEIPT"; exit 1; }
          VERDICT=$(jq -r '.verdict' "$RECEIPT")
          FAILS=$(jq -r '.failures | length' "$RECEIPT")
          UNIQUE=$(jq -r '.unique_calls' "$RECEIPT")
          EXECUTED=$(jq -r '.executed' "$RECEIPT")
          echo "Receipt: verdict=$VERDICT failures=$FAILS executed=$EXECUTED/$UNIQUE"
          [ "$VERDICT" = "PASS" ] || { echo "ERROR: receipt verdict is not PASS"; exit 1; }
          [ "$FAILS" = "0" ] || { echo "ERROR: receipt has failures"; exit 1; }
          [ "$EXECUTED" = "$UNIQUE" ] || { echo "ERROR: receipt executed != unique calls"; exit 1; }

      # ─── Build publication archives ──────────────────────────────────────────
      - name: Build .tar.gz and .zip archives
        id: archives
        run: |
          set -euo pipefail
          VER="${{ steps.version.outputs.version }}"
          mkdir -p artifacts
          (cd datasets/jam-actions-v0-public && tar -czf "../../artifacts/jam-actions-v0-public-${VER}.tar.gz" .)
          (cd datasets && zip -qr "../artifacts/jam-actions-v0-public-${VER}.zip" jam-actions-v0-public)

          TAR_SHA=$(sha256sum "artifacts/jam-actions-v0-public-${VER}.tar.gz" | cut -d' ' -f1)
          ZIP_SHA=$(sha256sum "artifacts/jam-actions-v0-public-${VER}.zip" | cut -d' ' -f1)
          echo "tar_sha=$TAR_SHA" >> $GITHUB_OUTPUT
          echo "zip_sha=$ZIP_SHA" >> $GITHUB_OUTPUT
          echo "tar=artifacts/jam-actions-v0-public-${VER}.tar.gz" >> $GITHUB_OUTPUT
          echo "zip=artifacts/jam-actions-v0-public-${VER}.zip" >> $GITHUB_OUTPUT

          echo "Archives:"
          ls -la artifacts/
          echo "tar.gz sha256: $TAR_SHA"
          echo "zip    sha256: $ZIP_SHA"

      - name: Upload archives as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jam-actions-v0-public-${{ steps.version.outputs.version }}-archives
          path: artifacts/
          if-no-files-found: error
          retention-days: 14

      # ─── Zenodo: create deposit (DRAFT) ──────────────────────────────────────
      # Two paths, selected by the zenodo_newversion_of input:
      #   - NEW VERSION (default, id=20279919): POST .../actions/newversion on
      #     the published record → a draft of the next version under the SAME
      #     concept DOI (10.5281/zenodo.20279918). Zenodo copies the previous
      #     version's files into the draft; we delete them so only this
      #     version's archives ship. Publishing the draft mints the new
      #     version DOI. The published prior version is never touched.
      #   - FRESH DEPOSIT (input left empty): POST an empty deposition — a
      #     brand-new record with its OWN concept DOI. Only for a first-ever
      #     publication, never for corrections to an already-published dataset.
      - name: Create Zenodo deposit (DRAFT)
        id: zenodo_draft
        env:
          ZEN_TOKEN: ${{ secrets.ZEN_TOKEN }}
          NEWVERSION_OF: ${{ github.event.inputs.zenodo_newversion_of }}
        run: |
          set -euo pipefail
          if [ -z "${ZEN_TOKEN:-}" ]; then
            echo "ERROR: ZEN_TOKEN secret is not set"
            exit 1
          fi

          if [ -n "${NEWVERSION_OF:-}" ]; then
            # Validate the input is a bare record id (digits only).
            case "$NEWVERSION_OF" in
              *[!0-9]*)
                echo "ERROR: zenodo_newversion_of must be a numeric record id (got: $NEWVERSION_OF)"
                exit 1
                ;;
            esac
            echo "Creating NEW VERSION draft of published record $NEWVERSION_OF..."
            NV_RESP=$(curl --fail-with-body -sSL -X POST \
              -H "Authorization: Bearer $ZEN_TOKEN" \
              "https://zenodo.org/api/deposit/depositions/$NEWVERSION_OF/actions/newversion")
            DRAFT_URL=$(echo "$NV_RESP" | jq -r '.links.latest_draft')
            if [ -z "$DRAFT_URL" ] || [ "$DRAFT_URL" = "null" ]; then
              echo "ERROR: newversion response carried no links.latest_draft"
              echo "$NV_RESP" | jq '{id, state, submitted, links}'
              exit 1
            fi
            DEPOSIT=$(curl --fail-with-body -sSL \
              -H "Authorization: Bearer $ZEN_TOKEN" \
              "$DRAFT_URL")
            DEPOSIT_ID=$(echo "$DEPOSIT" | jq -r '.id')

            # Delete the files Zenodo copied over from the previous version —
            # this version ships only its own archives. (Draft-only operation;
            # the published prior version's files are immutable.)
            echo "$DEPOSIT" | jq -r '.files[]?.id' | while read -r FID; do
              [ -n "$FID" ] || continue
              echo "  deleting inherited draft file $FID"
              curl --fail-with-body -sSL -X DELETE \
                -H "Authorization: Bearer $ZEN_TOKEN" \
                "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/files/$FID"
            done
            # Re-fetch for the bucket link after file deletion.
            DEPOSIT=$(curl --fail-with-body -sSL \
              -H "Authorization: Bearer $ZEN_TOKEN" \
              "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID")
          else
            echo "Creating FRESH deposit (new concept DOI)..."
            DEPOSIT=$(curl --fail-with-body -sSL -X POST \
              -H "Authorization: Bearer $ZEN_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{}' \
              "https://zenodo.org/api/deposit/depositions")
          fi

          DEPOSIT_ID=$(echo "$DEPOSIT" | jq -r '.id')
          BUCKET_URL=$(echo "$DEPOSIT" | jq -r '.links.bucket')
          DEPOSIT_HTML=$(echo "$DEPOSIT" | jq -r '.links.html')

          echo "deposit_id=$DEPOSIT_ID" >> $GITHUB_OUTPUT
          echo "deposit_html=$DEPOSIT_HTML" >> $GITHUB_OUTPUT
          echo "bucket_url=$BUCKET_URL" >> $GITHUB_OUTPUT
          echo "Zenodo draft created: $DEPOSIT_HTML (id=$DEPOSIT_ID)"

      - name: Upload archives to Zenodo bucket
        env:
          ZEN_TOKEN: ${{ secrets.ZEN_TOKEN }}
        run: |
          set -euo pipefail
          BUCKET="${{ steps.zenodo_draft.outputs.bucket_url }}"
          for f in "${{ steps.archives.outputs.tar }}" "${{ steps.archives.outputs.zip }}"; do
            name=$(basename "$f")
            echo "Uploading $name..."
            curl --fail-with-body -sSL -X PUT \
              -H "Authorization: Bearer $ZEN_TOKEN" \
              --upload-file "$f" \
              "$BUCKET/$name" > /tmp/upload-resp.json
            uploaded_sha=$(jq -r '.checksum' /tmp/upload-resp.json | sed 's/^md5://')
            echo "  uploaded with checksum: $uploaded_sha"
          done

      - name: Set Zenodo deposit metadata
        env:
          ZEN_TOKEN: ${{ secrets.ZEN_TOKEN }}
        run: |
          set -euo pipefail
          DEPOSIT_ID="${{ steps.zenodo_draft.outputs.deposit_id }}"

          # zenodo-metadata.json ALREADY has the { "metadata": {...} } envelope.
          # We only need to strip the leading $schema_note (a documentation field) so
          # Zenodo doesn't see an unknown top-level key. Do NOT re-wrap.
          jq 'del(.["$schema_note"])' datasets/jam-actions-v0-public/zenodo-metadata.json > /tmp/meta-payload.json
          echo "Metadata payload top-level keys:"
          jq 'keys' /tmp/meta-payload.json
          echo "Inner metadata keys:"
          jq '.metadata | keys' /tmp/meta-payload.json

          HTTP_CODE=$(curl -sSL -w "%{http_code}" -o /tmp/meta-resp.json -X PUT \
            -H "Authorization: Bearer $ZEN_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/meta-payload.json \
            "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID")

          echo "Metadata PUT HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Metadata PUT FAILED. Response body:"
            cat /tmp/meta-resp.json
            exit 1
          fi

          echo "Metadata set. Title:"
          jq -r '.metadata.title' /tmp/meta-resp.json
          echo "Reserved DOI:"
          jq -r '.metadata.prereserve_doi.doi // "(none)"' /tmp/meta-resp.json

      # ─── Zenodo: publish (mint DOI) — gated by mode + confirm ────────────────
      - name: Publish Zenodo deposit (MINTS DOI)
        id: zenodo_publish
        if: |
          (github.event.inputs.mode == 'publish' || github.event.inputs.mode == 'publish-zenodo-only')
          && github.event.inputs.confirm_irreversible == 'yes-mint-doi'
        env:
          ZEN_TOKEN: ${{ secrets.ZEN_TOKEN }}
        run: |
          set -euo pipefail
          DEPOSIT_ID="${{ steps.zenodo_draft.outputs.deposit_id }}"

          HTTP_CODE=$(curl -sSL -w "%{http_code}" -o /tmp/publish-resp.json -X POST \
            -H "Authorization: Bearer $ZEN_TOKEN" \
            "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID/actions/publish")

          echo "Publish POST HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
            echo "Zenodo PUBLISH FAILED. Response body:"
            cat /tmp/publish-resp.json | jq . 2>/dev/null || cat /tmp/publish-resp.json
            echo ""
            echo "Diagnostic: fetching current deposit state..."
            curl -sSL -H "Authorization: Bearer $ZEN_TOKEN" \
              "https://zenodo.org/api/deposit/depositions/$DEPOSIT_ID" \
              | jq '{ state: .state, submitted: .submitted, files: (.files | length), metadata_keys: (.metadata | keys), license: .metadata.license, language: .metadata.language, related_identifiers: .metadata.related_identifiers, missing: .metadata.errors }'
            exit 1
          fi

          PUBLISH=$(cat /tmp/publish-resp.json)
          DOI=$(echo "$PUBLISH" | jq -r '.doi // empty')
          DOI_URL=$(echo "$PUBLISH" | jq -r '.doi_url // empty')
          RECORD_URL=$(echo "$PUBLISH" | jq -r '.links.record_html // .links.record // empty')

          echo "doi=$DOI" >> $GITHUB_OUTPUT
          echo "doi_url=$DOI_URL" >> $GITHUB_OUTPUT
          echo "record_url=$RECORD_URL" >> $GITHUB_OUTPUT

          echo "Zenodo PUBLISHED"
          echo "DOI:       $DOI"
          echo "DOI URL:   $DOI_URL"
          echo "Record:    $RECORD_URL"

      # ─── HuggingFace: push (gated by mode=publish + confirm) ─────────────────
      - name: Install huggingface_hub
        if: github.event.inputs.mode == 'publish' && github.event.inputs.confirm_irreversible == 'yes-mint-doi'
        run: pip install --quiet huggingface_hub

      - name: Push dataset to HuggingFace
        id: hf_push
        if: github.event.inputs.mode == 'publish' && github.event.inputs.confirm_irreversible == 'yes-mint-doi'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: mcp-tool-shop/jam-actions-v0
        run: |
          set -euo pipefail
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "ERROR: HF_TOKEN secret is not set"
            exit 1
          fi
          python3 << 'PY'
          import os, sys
          from huggingface_hub import HfApi
          from huggingface_hub.utils import RepositoryNotFoundError

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_REPO_ID"]
          api = HfApi(token=token)

          try:
              api.repo_info(repo_id=repo_id, repo_type="dataset")
              print(f"HF repo already exists: {repo_id}")
          except RepositoryNotFoundError:
              api.create_repo(repo_id=repo_id, repo_type="dataset", private=False)
              print(f"Created HF dataset repo: {repo_id}")

          version = open("datasets/jam-actions-v0-public/VERSION").read().strip()
          commit = api.upload_folder(
              folder_path="datasets/jam-actions-v0-public",
              repo_id=repo_id,
              repo_type="dataset",
              commit_message=f"Publish jam-actions-v0 v{version}",
          )
          print(f"HF push commit: {commit}")
          print(f"HF URL: https://huggingface.co/datasets/{repo_id}")

          # Write URL to a file the next step can read
          with open("/tmp/hf-url.txt", "w") as f:
              f.write(f"https://huggingface.co/datasets/{repo_id}\n")
          PY

          HF_URL=$(cat /tmp/hf-url.txt | tr -d '\n')
          echo "hf_url=$HF_URL" >> $GITHUB_OUTPUT

      # ─── Final receipt summary ───────────────────────────────────────────────
      - name: Print final receipt
        if: always()
        run: |
          set -euo pipefail
          echo "================================================================"
          echo "  jam-actions-v0 publication receipt"
          echo "================================================================"
          echo "  Mode:                ${{ github.event.inputs.mode }}"
          echo "  Confirmation:        ${{ github.event.inputs.confirm_irreversible == 'yes-mint-doi' && 'yes-mint-doi' || 'NO' }}"
          echo "  New version of:      ${{ github.event.inputs.zenodo_newversion_of || '(fresh deposit — new concept DOI)' }}"
          echo "  Ref:                 ${{ github.event.inputs.ref }}"
          echo "  Version:             ${{ steps.version.outputs.version }}"
          echo "  Tar.gz sha256:       ${{ steps.archives.outputs.tar_sha }}"
          echo "  Zip sha256:          ${{ steps.archives.outputs.zip_sha }}"
          echo "  Zenodo draft URL:    ${{ steps.zenodo_draft.outputs.deposit_html }}"
          echo "  Zenodo deposit ID:   ${{ steps.zenodo_draft.outputs.deposit_id }}"
          echo "  Zenodo DOI:          ${{ steps.zenodo_publish.outputs.doi || '(not minted — draft only)' }}"
          echo "  Zenodo DOI URL:      ${{ steps.zenodo_publish.outputs.doi_url || '(not minted)' }}"
          echo "  Zenodo record:       ${{ steps.zenodo_publish.outputs.record_url || '(not minted)' }}"
          echo "  HuggingFace URL:     ${{ steps.hf_push.outputs.hf_url || '(not pushed)' }}"
          echo "================================================================"
          echo ""
          echo "Tokens are NOT in this log (they live in GitHub Secrets only)."
          echo "Capture the URLs above into datasets/jam-actions-v0-public/publication-receipt.json"
          echo "via a follow-up local commit (NOT inside this workflow)."
