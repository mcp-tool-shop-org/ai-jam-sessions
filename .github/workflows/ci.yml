name: CI

on:
  push:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "src/**"
      - "apps/**"
      - "scripts/**"
      - "Dockerfile"
      - "plugin/**"
      - ".github/workflows/**"
    branches: [main]
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "src/**"
      - "apps/**"
      - "scripts/**"
      - "Dockerfile"
      - "plugin/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Floor is 22: node-web-audio-api 2.0 (napi v3) requires Node >= 22,
        # and package.json's engines field matches. 24 covers current LTS —
        # the same line release.yml publishes from.
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        if: matrix.node-version == 22
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

      - name: Smoke
        run: pnpm smoke

  # The main matrix installs via pnpm 10 (bumped from 9 on 2026-07-09 when
  # overrides moved to pnpm-workspace.yaml — pnpm 9 can't read them there and
  # fails frozen installs with ERR_PNPM_LOCKFILE_CONFIG_MISMATCH). This job
  # keeps the cold-start + dependency-cache path covered on the same pnpm 10;
  # pnpm-workspace.yaml's keys were verified (coordinator, 2026-07) to install
  # cleanly under pnpm 11 too, so the next major bump is pre-validated.
  pnpm10-install:
    name: Modern pnpm cold-start (pnpm 10, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level critical

  plugin-validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check plugin.json / marketplace.json version parity with package.json
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const plugin = JSON.parse(fs.readFileSync("plugin/.claude-plugin/plugin.json", "utf8"));
            const marketplace = JSON.parse(fs.readFileSync("plugin/.claude-plugin/marketplace.json", "utf8"));
            const mpVersion = marketplace.plugins && marketplace.plugins[0] && marketplace.plugins[0].version;
            const errors = [];
            if (plugin.version !== pkg.version) {
              errors.push("plugin.json version (" + plugin.version + ") != package.json version (" + pkg.version + ")");
            }
            if (mpVersion !== pkg.version) {
              errors.push("marketplace.json plugins[0].version (" + mpVersion + ") != package.json version (" + pkg.version + ")");
            }
            if (errors.length) {
              console.error("Plugin manifest drift detected:");
              for (const e of errors) console.error(" - " + e);
              process.exit(1);
            }
            console.log("Plugin manifests match package.json version " + pkg.version);
          '

  # apps/cockpit is a standalone Vite/TS app, deliberately NOT a pnpm
  # workspace member (pnpm-workspace.yaml's `packages` list is just "." —
  # see that file's own comment) and has no pnpm-lock.yaml of its own (only
  # a legacy package-lock.json) — so this job installs/typechecks/builds it
  # in isolation rather than folding it into the root `ci` job's
  # `pnpm install --frozen-lockfile` (which only ever touches the root
  # lockfile). No dependency caching here: with no pnpm-lock.yaml to hash,
  # actions/setup-node's `cache: pnpm` has nothing reliable to key off for
  # this directory, and the install here is small/fast enough that it isn't
  # worth the risk of a cache-resolution edge case failing the job.
  cockpit:
    name: Cockpit app (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cockpit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install cockpit dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
