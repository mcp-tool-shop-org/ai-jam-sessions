name: CI

on:
  push:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "src/**"
      - "Dockerfile"
      - "plugin/**"
      - ".github/workflows/**"
    branches: [main]
  pull_request:
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.json"
      - "src/**"
      - "Dockerfile"
      - "plugin/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Test with coverage
        if: matrix.node-version == 22
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

      - name: Smoke
        run: pnpm smoke

  # Node 20/22 above always install via pnpm 9 (pnpm/action-setup version: 9).
  # This job covers the modern-pnpm cold-start path so a future bump past
  # pnpm 9 in the main matrix doesn't ship untested. pnpm-workspace.yaml's
  # allowBuilds/onlyBuiltDependencies keys were verified (coordinator,
  # 2026-07) to install cleanly under pnpm 11 too — this job pins pnpm 10 to
  # cover the nearer-term upgrade path without expanding the main matrix.
  pnpm10-install:
    name: Modern pnpm cold-start (pnpm 10, Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  dep-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --prod --audit-level critical

  plugin-validate:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check plugin.json / marketplace.json version parity with package.json
        run: |
          node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            const plugin = JSON.parse(fs.readFileSync("plugin/.claude-plugin/plugin.json", "utf8"));
            const marketplace = JSON.parse(fs.readFileSync("plugin/.claude-plugin/marketplace.json", "utf8"));
            const mpVersion = marketplace.plugins && marketplace.plugins[0] && marketplace.plugins[0].version;
            const errors = [];
            if (plugin.version !== pkg.version) {
              errors.push("plugin.json version (" + plugin.version + ") != package.json version (" + pkg.version + ")");
            }
            if (mpVersion !== pkg.version) {
              errors.push("marketplace.json plugins[0].version (" + mpVersion + ") != package.json version (" + pkg.version + ")");
            }
            if (errors.length) {
              console.error("Plugin manifest drift detected:");
              for (const e of errors) console.error(" - " + e);
              process.exit(1);
            }
            console.log("Plugin manifests match package.json version " + pkg.version);
          '
